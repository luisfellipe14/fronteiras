name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  release:
    types: [published, edited]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag with demandas.csv"
        required: false
        default: "data-latest"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Resolve release tag
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ inputs.release_tag }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
        run: |
          tag="${EVENT_TAG:-${INPUT_TAG:-data-latest}}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Fetch demandas.csv (release asset takes priority over repo copy)
        id: fetch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          mkdir -p csv
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            assets=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" \
              --json assets --jq '.assets[].name' | grep -iE '\.csv$' || true)
            if [ -n "$assets" ]; then
              picked=$(echo "$assets" | grep -iE '^demandas' | head -n1)
              if [ -z "$picked" ]; then picked=$(echo "$assets" | head -n1); fi
              echo "Release $TAG: downloading asset '$picked'"
              gh release download "$TAG" --repo "$GITHUB_REPOSITORY" \
                --pattern "$picked" --dir csv --clobber
              if [ "$picked" != "demandas.csv" ]; then
                mv -f "csv/$picked" csv/demandas.csv
              fi
            else
              echo "Release $TAG has no .csv asset"
            fi
          else
            echo "Release $TAG not found"
          fi
          if [ -s csv/demandas.csv ]; then
            echo "Using csv/demandas.csv ($(stat -c%s csv/demandas.csv) bytes)"
            echo "found=1" >> "$GITHUB_OUTPUT"
          else
            echo "No demandas.csv available — site will fall back to mock data"
            echo "found=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Run preprocess
        if: steps.fetch.outputs.found == '1'
        run: python scripts/preprocess.py

      - name: Drop CSV before upload
        if: always()
        run: rm -f csv/demandas.csv

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
